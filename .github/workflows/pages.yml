
name: Build and deploy Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy DNS Bhat markdown into docs/
        run: |
          rm -rf docs/dnsbhat || true
          mkdir -p docs/dnsbhat
          cp -R src/main/md/kannada/dnsbhat/. docs/dnsbhat/
          mv docs/dnsbhat/README.md docs/dnsbhat/index.md
          printf -- '---\nlayout: default\ntitle: DNS Bhat\nnav_order: 1\nhas_children: true\n---\n\n' | cat - docs/dnsbhat/index.md > /tmp/dnsbhat_index.md && mv /tmp/dnsbhat_index.md docs/dnsbhat/index.md

      - name: Generate source-first nested sidebar and book landing pages
        run: |
          python3 - <<'PYEOF'
          import os, re

          DNSBHAT = 'docs/dnsbhat'

          # ── Source × Language hierarchy ───────────────────────────────────
          # Top-level sidebar sections: one per content source
          SOURCES = [
              ('book',    'Books',   10),   # (dir_prefix, title, nav_order)
              ('web',     'Blog',    20),
              ('youtube', 'YouTube', 30),
              ('stub',    'Stubs',   40),
          ]
          # Language sub-sections nested inside each source
          LANGS = [
              ('en',  'English',  1),   # (lang_dir, title, nav_order)
              ('kn',  'ಕನ್ನಡ',    2),
              ('eke', 'Eke',      3),
          ]
          # File search candidates per (source_dir, lang_dir) — first match wins
          CANDIDATES = {
              ('book',    'en'):  ['book/en/summary.md'],
              ('book',    'kn'):  ['book/kn/full.md', 'book/vol1/kn/full.md'],
              ('book',    'eke'): ['book/eke/full.md', 'book/vol1/eke/full.md'],
              ('web',     'en'):  ['web/en/summary.md'],
              ('web',     'kn'):  ['web/kn/full.md', 'web/kn/raw.md'],
              ('web',     'eke'): ['web/eke/full.md'],
              ('youtube', 'en'):  ['youtube/en/summary.md'],
              ('youtube', 'kn'):  ['youtube/kn/full.md'],
              ('youtube', 'eke'): ['youtube/eke/full.md'],
              ('stub',    'kn'):  ['youtube/kn/full.md'],
          }
          SRC_TITLE  = {s: t for s, t, _ in SOURCES}
          LANG_TITLE = {l: t for l, t, _ in LANGS}
          SRC_DESC = {
              'book':    'Scanned book content — Kannada text, English summaries, and Eke romanisation.',
              'web':     'DNS Bhat blog articles — web-published Kannada linguistics content.',
              'youtube': 'YouTube lecture series — transcripts, summaries, and romanisation.',
              'stub':    'Placeholder entries — content not yet collected for these books.',
          }
          LANG_ICON  = {'kn': '📖', 'en': '🇬🇧', 'eke': '🔤'}
          LANG_LABEL = {'kn': 'ಕನ್ನಡ', 'en': 'English', 'eke': 'Eke'}
          SRC_LABEL  = {'book': 'Book', 'web': 'Blog', 'youtube': 'YouTube', 'stub': 'Stub'}

          def fm(**fields):
              lines = ['---']
              for k, v in fields.items():
                  if isinstance(v, list):
                      lines.append(f'{k}:')
                      for item in v:
                          lines.append(f'  - {item}')
                  elif isinstance(v, str):
                      lines.append(f'{k}: "{v}"')
                  else:
                      lines.append(f'{k}: {str(v).lower()}')
              lines.append('---\n')
              return '\n'.join(lines)

          def strip_fm(text):
              m = re.match(r'^---\n.*?\n---\n\n?', text, re.DOTALL)
              return text[m.end():] if m else text

          def read_field(fm_text, key):
              m = re.search(rf'^{key}:\s*"?(.+?)"?\s*$', fm_text, re.MULTILINE)
              return m.group(1).strip('"') if m else None

          def get_redirect_from(content):
              if not content.startswith('---\n'):
                  return None
              m = re.match(r'^---\n(.*?)\n---\n', content, re.DOTALL)
              if not m:
                  return None
              rf_m = re.search(r'^redirect_from:\n((?:  - .+\n?)+)', m.group(1), re.MULTILINE)
              if rf_m:
                  return re.findall(r'  - (.+)', rf_m.group(0))
              return None

          def add_nav_exclude(fp):
              with open(fp, encoding='utf-8') as f:
                  content = f.read()
              if content.startswith('---\n'):
                  content = '---\nnav_exclude: true\n' + content[4:]
              else:
                  content = '---\nnav_exclude: true\n---\n\n' + content
              with open(fp, 'w', encoding='utf-8') as f:
                  f.write(content)

          def url(rel):
              return rel[:-3] if rel and rel.endswith('.md') else rel

          def is_youtube_stub(fp):
              """Return True if the youtube/kn/full.md has no real transcript parts."""
              try:
                  with open(fp, encoding='utf-8') as f:
                      content = f.read()
                  return not re.search(r'^#{2,3} Part\b', content, re.MULTILINE)
              except OSError:
                  return True

          def stub_lang(fp):
              """Return 'kn' if stub body has substantial Kannada text, else 'en'."""
              try:
                  with open(fp, encoding='utf-8') as f:
                      body = strip_fm(f.read())
                  return 'kn' if sum(1 for c in body if '\u0C80' <= c <= '\u0CFF') > 50 else 'en'
              except OSError:
                  return 'kn'

          # Track files that have been assigned proper sidebar front matter
          sidebar_files = set()
          sidebar_files.add(os.path.join(DNSBHAT, 'index.md'))

          # ── Pass 1: Gather book metadata and content paths ────────────────
          books = []
          for book_dir in sorted(os.listdir(DNSBHAT)):
              book_path = os.path.join(DNSBHAT, book_dir)
              if not os.path.isdir(book_path):
                  continue

              # Nav metadata carrier priority: youtube first, then book sources
              _meta_candidates = [
                  os.path.join(book_path, 'youtube', 'kn', 'full.md'),
                  os.path.join(book_path, 'book', 'kn', 'full.md'),
                  os.path.join(book_path, 'book', 'vol1', 'kn', 'full.md'),
                  os.path.join(book_path, 'book', 'en', 'summary.md'),
                  os.path.join(book_path, 'book', 'kn', 'raw.md'),
              ]
              main_md = next((p for p in _meta_candidates if os.path.exists(p)), None)
              if main_md is None:
                  continue

              with open(main_md, encoding='utf-8') as f:
                  orig = f.read()
              if not orig.startswith('---'):
                  continue
              fm_match = re.match(r'^---\n(.*?)\n---\n\n?', orig, re.DOTALL)
              if not fm_match:
                  continue

              fm_text    = fm_match.group(1)
              book_title = read_field(fm_text, 'title') or book_dir
              raw_order  = int(read_field(fm_text, 'nav_order') or 0)
              book_num   = raw_order % 100   # 101→1, 124→24

              # Find content file for each (source, lang) combo — first match wins
              found = {}   # (src_dir, lang_dir) → (abs_path, rel)
              for (src, lang), candidates in CANDIDATES.items():
                  # stub candidates are resolved after youtube reclassification below
                  if src == 'stub':
                      continue
                  for rel in candidates:
                      fp = os.path.join(book_path, rel)
                      if os.path.exists(fp):
                          found[(src, lang)] = (fp, rel)
                          break

              # Reclassify youtube/kn stub entries → stub/kn
              # A stub is a youtube/kn/full.md with no ## Part / ### Part headers
              yt_kn = found.get(('youtube', 'kn'))
              if yt_kn and is_youtube_stub(yt_kn[0]):
                  # Drop the youtube stub entry; only add to Stubs section if the
                  # book has no real content in any other source (book, web, etc.)
                  has_real_content = any(s != 'youtube' for (s, _) in found)
                  if not has_real_content:
                      _slang = stub_lang(yt_kn[0])
                      found[('stub', _slang)] = yt_kn
                  del found[('youtube', 'kn')]
                  found.pop(('youtube', 'en'),  None)
                  found.pop(('youtube', 'eke'), None)

              # Extract Kannada-script title from kn content (first heading with ಕನ್ನಡ chars)
              kn_title = None
              for _src in ['book', 'youtube', 'stub', 'web']:
                  _kn = found.get((_src, 'kn'))
                  if _kn:
                      try:
                          with open(_kn[0], encoding='utf-8') as _f:
                              _body = strip_fm(_f.read())
                          for _m in re.finditer(r'^#{1,3} (.+)$', _body, re.MULTILINE):
                              _cand = _m.group(1).strip()
                              if any('\u0C80' <= c <= '\u0CFF' for c in _cand):
                                  kn_title = _cand
                                  break
                      except OSError:
                          pass
                      break

              books.append({
                  'dir':               book_dir,
                  'path':              book_path,
                  'title':             book_title,
                  'kn_title':          kn_title,
                  'raw_order':         raw_order,
                  'book_num':          book_num,
                  'redirect_from_main': get_redirect_from(orig),
                  'found':             found,
              })

          # ── Determine which source / source×lang combos have content ──────
          active_srcs      = set(src for b in books for (src, _) in b['found'])
          active_src_langs = set((src, lang) for b in books for (src, lang) in b['found'])

          # ── Pass 2: Create top-level source section pages ─────────────────
          for src_dir, src_title, src_order in SOURCES:
              if src_dir not in active_srcs:
                  continue
              fp = os.path.join(DNSBHAT, f'{src_dir}.md')
              with open(fp, 'w', encoding='utf-8') as f:
                  f.write(fm(title=src_title, nav_order=src_order,
                             has_children=True, nav_exclude=False))
                  f.write(f'# {src_title}\n\n{SRC_DESC[src_dir]}\n')
              sidebar_files.add(fp)

          # ── Pass 3: Create language sub-section pages ─────────────────────
          for src_dir, src_title, _ in SOURCES:
              if src_dir not in active_srcs:
                  continue
              for lang_dir, lang_title, lang_order in LANGS:
                  if (src_dir, lang_dir) not in active_src_langs:
                      continue
                  fp = os.path.join(DNSBHAT, f'{src_dir}-{lang_dir}.md')
                  with open(fp, 'w', encoding='utf-8') as f:
                      f.write(fm(title=lang_title, parent=src_title,
                                 nav_order=lang_order, has_children=True,
                                 nav_exclude=False))
                      f.write(f'# {lang_title}\n')
                  sidebar_files.add(fp)

          # ── Pass 4: Write front matter for content files ──────────────────
          # Each content file gets: parent=lang_title, grand_parent=src_title
          for b in books:
              for (src, lang), (file_path, _) in b['found'].items():
                  with open(file_path, encoding='utf-8') as f:
                      content = f.read()
                  redirect_from = get_redirect_from(content)
                  content = strip_fm(content)
                  # kn sidebar entries use Kannada script title when available
                  sidebar_title = (
                      b['kn_title'] if lang == 'kn' and b.get('kn_title')
                      else b['title']
                  )
                  fm_args = dict(
                      title=sidebar_title,
                      parent=LANG_TITLE[lang],
                      grand_parent=SRC_TITLE[src],
                      nav_order=b['book_num'],
                  )
                  if redirect_from:
                      fm_args['redirect_from'] = redirect_from
                  with open(file_path, 'w', encoding='utf-8') as f:
                      f.write(fm(**fm_args))
                      f.write(content)
                  sidebar_files.add(file_path)

          # ── Pass 5: Build book landing pages as index.md ─────────────────
          # Written to index.md (not README.md) so Jekyll serves the page at
          # the directory URL /dnsbhat/NN-slug/ — top-level README links work.
          for b in books:
              readme_src = os.path.join(b['path'], 'README.md')
              if not os.path.exists(readme_src):
                  continue

              with open(readme_src, encoding='utf-8') as f:
                  readme = f.read()

              m = re.search(r'^# \d+ — (.+)$', readme, re.MULTILINE)
              kn_title = m.group(1).strip() if m else ''
              m = re.search(r'^\*\*([^*\n]+)\*\*', readme, re.MULTILINE)
              en_title = m.group(1) if m else ''
              m = re.search(r'^> (.+)$', readme, re.MULTILINE)
              desc_line = m.group(1) if m else ''
              m = re.search(r'^\*\*((?:✅|⚠️)[^\n]+)\*\*', readme, re.MULTILINE)
              status_line = m.group(1) if m else ''

              # Link table grouped by source
              link_rows = []
              for src_dir, _, _ in SOURCES:
                  for lang_dir, _, _ in LANGS:
                      if (src_dir, lang_dir) in b['found']:
                          _, rel = b['found'][(src_dir, lang_dir)]
                          link_rows.append(
                              f'| {LANG_ICON[lang_dir]} {SRC_LABEL[src_dir]}'
                              f' | [{LANG_LABEL[lang_dir]}](./{url(rel)}) |')
              web_raw = os.path.join(b['path'], 'web', 'kn', 'raw.md')
              if os.path.exists(web_raw):
                  link_rows.append('| 📝 Blog raw | [ಕನ್ನಡ raw](./web/kn/raw) |')

              body_parts = []
              if kn_title:
                  body_parts.append(f'# {kn_title}\n')
              if en_title:
                  body_parts.append(f'**{en_title}**\n')
              if desc_line:
                  body_parts.append(f'\n> {desc_line}\n')
              if status_line:
                  body_parts.append(f'\n*{status_line}*\n')
              if link_rows:
                  body_parts.append('\n---\n\n| Source | Link |\n|--------|------|\n')
                  body_parts.extend(r + '\n' for r in link_rows)

              lf_args = dict(title=b['title'], nav_order=b['raw_order'], nav_exclude=True)
              if b['redirect_from_main']:
                  lf_args['redirect_from'] = b['redirect_from_main']

              # Write to index.md so the directory URL /NN-slug/ resolves correctly
              index_md = os.path.join(b['path'], 'index.md')
              with open(index_md, 'w', encoding='utf-8') as f:
                  f.write(fm(**lf_args) + ''.join(body_parts))
              sidebar_files.add(index_md)

          # ── Pass 6: Mark all remaining .md files as nav_exclude ───────────
          for root, dirs, files in os.walk(DNSBHAT):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              for fname in files:
                  if fname.endswith('.md'):
                      fp = os.path.join(root, fname)
                      if fp not in sidebar_files:
                          add_nav_exclude(fp)

          print("Source-first nested sidebar and landing pages generated.")
          PYEOF

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs

      - name: Setup Pages
        id: setup-pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.setup-pages.outputs.base_path }}"
        working-directory: docs
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
