
name: Build and deploy Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy Kannada markdown sources into docs/kannaDa/
        run: |
          rm -rf docs/kannaDa docs/dnsbhat || true
          mkdir -p docs/kannaDa/dnsbhat docs/kannaDa/eke docs/kannaDa/grammar docs/kannaDa/wordcoining
          cp src/main/md/kannada/index.md docs/kannaDa/index.md
          cp -R src/main/md/kannada/dnsbhat/. docs/kannaDa/dnsbhat/
          cp -R src/main/md/kannada/eke/. docs/kannaDa/eke/
          cp -R src/main/md/kannada/wordcoining/. docs/kannaDa/wordcoining/
          cp src/main/md/kannada/grammar/*.md  docs/kannaDa/grammar/
          cp src/main/md/kannada/grammar/*-illustrated.html docs/kannaDa/grammar/
          # README.md → index.md for dnsbhat (nav_exclude set by Python script)
          if [ -f docs/kannaDa/dnsbhat/README.md ]; then
            mv docs/kannaDa/dnsbhat/README.md docs/kannaDa/dnsbhat/index.md
          fi
          # README.md → index.md for grammar
          if [ -f docs/kannaDa/grammar/README.md ]; then
            mv docs/kannaDa/grammar/README.md docs/kannaDa/grammar/index.md
          fi

      - name: Copy Books catalog into docs/Books/
        run: |
          rm -rf docs/Books || true
          mkdir -p docs/Books/influential
          cp src/main/md/Books/*.md docs/Books/
          cp src/main/md/Books/influential/*.md docs/Books/influential/

      - name: Copy FP content into docs/FP/
        run: |
          rm -rf docs/FP || true
          mkdir -p docs/FP
          # pl/ — ॐλ only; FP.md (Forays) not ready yet
          cp "src/main/md/pl/ॐλ.md" docs/FP/om-lambda.md
          # haskell/
          cp src/main/md/haskell/hsom.md docs/FP/
          cp src/main/md/haskell/monoids-and-semigroups.md docs/FP/
          cp src/main/md/haskell/qsortof.md docs/FP/
          cp src/main/md/haskell/qsortof-part2.md docs/FP/
          cp src/main/md/haskell/reflection.md docs/FP/haskell-types.md
          cp "src/main/md/haskell/ಕಳ್ಳ.md" "docs/FP/kumbaLakAyi-kaLLanalla.md"
          cp src/main/md/haskell/modalakaLLa.jpg docs/FP/ 2>/dev/null || true
          # kojo/ — visual creativity merged into FP section
          cp src/main/md/kojo/cloud_flowers_and.md docs/FP/
          # kojo images — copy alongside the page so relative ./img.png links resolve
          cp src/main/scala/kojo/cloud_with_flowers.png docs/FP/
          cp src/main/scala/kojo/generated.png          docs/FP/
          cp src/main/scala/kojo/ladder_rand_shape.png  docs/FP/
          cp src/main/scala/kojo/with_g.png             docs/FP/

      - name: Copy Reflection notes into docs/Reflection/
        run: |
          rm -rf docs/Reflection || true
          mkdir -p docs/Reflection
          for f in src/main/md/self-reflection/2026-02-25_*.md; do
            dest="docs/Reflection/$(basename "$f" | sed 's/^[0-9-]*_//')"
            cp "$f" "$dest"
          done

      - name: Split book chapters into paginated pages
        run: |
          python3 - <<'PYEOF'
          import os, re

          DOCS_DNSBHAT = 'docs/kannaDa/dnsbhat'

          # Anchor-prefix priority: use the first prefix (coarsest grouping) with ≥ 2 matches.
          # ch / adhyAya- = book chapters; bhAga- / theme- = coarse YouTube/blog sections;
          # part- = fine-grained YouTube parts (used only when no coarser anchor exists).
          CHAPTER_PREFIXES = ['ch', 'adhyAya-', 'bhAga-', 'theme-', 'part-']
          ANCHOR_LABELS = {
              'ch': 'Ch', 'adhyAya-': 'Ch',
              'bhAga-': 'Part', 'theme-': 'Theme', 'part-': 'Part',
          }

          def find_positions(body):
              """Return (num, prefix, start) triples for the best anchor type in body."""
              for pfx in CHAPTER_PREFIXES:
                  pat = re.compile(r'<a id="' + re.escape(pfx) + r'(\d+)">')
                  pos = [(int(m.group(1)), pfx, m.start()) for m in pat.finditer(body)]
                  if len(pos) >= 2:
                      return pos
              return []

          def strip_fm(text):
              if text.startswith('---\n'):
                  m = re.match(r'^---\n.*?\n---\n\n?', text, re.DOTALL)
                  if m:
                      return text[m.end():]
              return text

          def first_heading(text):
              m = re.search(r'^## (.+)$', text, re.MULTILINE)
              if m:
                  # Strip inline Markdown links/bold, anchors, Eke cross-links
                  h = re.sub(r'\[([^\]]+)\]\([^)]*\)', r'\1', m.group(1))
                  h = re.sub(r'\*+([^*]+)\*+', r'\1', h)
                  h = h.strip()
                  # Strip leading chapter-number prefixes like "1. " or "೧. "
                  h = re.sub(r'^[\d\u0CE6-\u0CEF]+[.\s]+', '', h).strip()
                  return h
              return ''

          def jekyll_anchor(heading):
              """Compute Jekyll's auto-generated anchor ID for a heading string."""
              h = heading.lower()
              h = re.sub(r'[^\w\s-]', '', h)
              h = re.sub(r'\s+', '-', h.strip())
              return h

          def chapter_heading_anchors(body, positions):
              """Build mapping: Jekyll heading anchor → chN page slug.
              Used to rewrite TOC links like [A](#a) → [A](ch1) when a book
              uses heading-derived anchors instead of explicit #chN anchors."""
              result = {}
              for i, (ch_num, _pfx, pos) in enumerate(positions):
                  # Look only in first 300 chars of the chapter body for ## heading
                  chunk = body[pos:pos + 300]
                  m = re.search(r'^## (.+)$', chunk, re.MULTILINE)
                  if m:
                      heading_text = re.sub(r'<[^>]+>', '', m.group(1)).strip()
                      anchor = jekyll_anchor(heading_text)
                      if anchor:
                          result[anchor] = 'ch' + str(ch_num)
              return result

          SCROLL_THRESHOLD = 1500  # chars; add chapter list at top when content exceeds this

          def make_index(fp, positions, body, ch_links, out_dir=None):
              """ch0.md: chapter quick-nav at top (when long) + preamble + TOC + chapter nav."""
              if out_dir is None:
                  out_dir = os.path.dirname(fp)
              preamble = body[:positions[0][2]].strip()
              heading_anchors = chapter_heading_anchors(body, positions)
              # Build sec-N-M / sub-N-M-K → chN map so TOC deep-links survive chapter split
              # Also map explicit chapter anchors (adhyAya-N, part-N, etc.) → chN
              sec_map = {}
              ch_anchor_map = {}
              for _i, (ch_num, _pfx, pos) in enumerate(positions):
                  _end = positions[_i+1][2] if _i+1 < len(positions) else len(body)
                  for _a in re.findall(r'<a id="((?:sec|sub)-[\d-]+)"', body[pos:_end]):
                      sec_map[_a] = 'ch' + str(ch_num)
                  # Map the chapter anchor itself (e.g. adhyAya-1 → ch1)
                  for _a in re.findall(r'<a id="([^"]+)"', body[pos:pos+50]):
                      ch_anchor_map[_a] = 'ch' + str(ch_num)
              # Rewrite [text](#anchor) → [text](chN) or [text](chN#sec-N-M)
              def rewrite_anchor(m):
                  text, anchor = m.group(1), m.group(2)
                  if re.match(r'ch\d+$', anchor):
                      return '[' + text + '](' + anchor + ')'
                  if anchor in ch_anchor_map:
                      return '[' + text + '](' + ch_anchor_map[anchor] + ')'
                  if anchor in heading_anchors:
                      return '[' + text + '](' + heading_anchors[anchor] + ')'
                  if anchor in sec_map:
                      return '[' + text + '](' + sec_map[anchor] + '#' + anchor + ')'
                  return m.group(0)
              preamble = re.sub(r'\[([^\]]+)\]\(#([^)]+)\)', rewrite_anchor, preamble)
              # Rewrite companion-language nav links: (path/full) → (path/ch0)
              # where the companion ch0.md will be generated in the same split run.
              # We store pending rewrites; a post-pass resolves them after all splits.
              ch_bar = '**Chapters:** ' + ch_links
              top = (ch_bar + '\n\n---\n\n') if len(preamble) > SCROLL_THRESHOLD else ''
              out = ('---\nnav_exclude: true\n---\n\n' + top + preamble
                     + '\n\n---\n\n' + ch_bar + '\n')
              with open(os.path.join(out_dir, 'ch0.md'), 'w', encoding='utf-8') as f:
                  f.write(out)

          def toc_title_map(body):
              """Build {ch_num: title} from TOC links like [ಅಧ್ಯಾಯ 1 — ಪೀಠಿಕೆ](#adhyAya-1)."""
              result = {}
              toc_re = re.compile(r'\[([^\]]+)\]\(#(?:adhyAya-|ch|part-|bhAga-|theme-)(\d+)\)')
              for m in toc_re.finditer(body):
                  n = int(m.group(2))
                  if n not in result:
                      t = m.group(1).strip()
                      # Strip "ಅಧ್ಯಾಯ N — " or "Chapter N — " prefixes
                      t = re.sub(r'^(?:ಅಧ್ಯಾಯ|Chapter)\s+\S+\s*[—\u2013-]\s*', '', t).strip()
                      t = re.sub(r'^\d+[.\s]+', '', t).strip()
                      if t:
                          result[n] = t
              return result

          def split_file(fp, out_dir=None):
              with open(fp, encoding='utf-8') as f:
                  text = f.read()
              body = strip_fm(text)
              positions = find_positions(body)
              if len(positions) < 2:
                  return 0
              if out_dir is None:
                  out_dir = os.path.dirname(fp)
              n = len(positions)
              # Determine label ("Ch" / "Part" / "Theme") from first anchor's prefix
              lbl = ANCHOR_LABELS.get(positions[0][1], 'Ch')
              ch_links = ' \u00b7 '.join(
                  '[' + lbl + ' ' + str(num) + '](ch' + str(num) + ')' for num, _, _ in positions)
              make_index(fp, positions, body, ch_links, out_dir=out_dir)
              toc_map = toc_title_map(body)
              for i, (chnum, _pfx, start) in enumerate(positions):
                  end = positions[i+1][2] if i+1 < n else len(body)
                  ch_body = body[start:end].strip()
                  title = toc_map.get(chnum, '') or first_heading(ch_body)
                  title_str = f'{lbl} {chnum}' + (f' \u2014 {title}' if title else '')
                  prev_nav = (f'[\u2190 {lbl} {positions[i-1][0]}](ch{positions[i-1][0]})'
                              if i > 0 else '[\u2191 Contents](ch0)')
                  next_nav = (f'[{lbl} {positions[i+1][0]} \u2192](ch{positions[i+1][0]})'
                              if i+1 < n else '[\u2191 Contents](ch0)')
                  nav = f'> {prev_nav} &nbsp;\u00b7&nbsp; [Contents](ch0) &nbsp;\u00b7&nbsp; {next_nav}\n\n'
                  # Add chapter quick-nav at top when page is long enough to need scrolling
                  ch_top = ('**Chapters:** ' + ch_links + '\n\n') if len(ch_body) > SCROLL_THRESHOLD else ''
                  out = f'---\ntitle: "{title_str}"\nnav_exclude: true\n---\n\n{nav}{ch_top}{ch_body}\n'
                  with open(os.path.join(out_dir, f'ch{chnum}.md'), 'w', encoding='utf-8') as f:
                      f.write(out)
              return n

          CANDIDATES = [
              'book/kn/full.md',    'book/eke/full.md',  'book/en/summary.md',
              'book/vol1/kn/full.md', 'book/vol1/eke/full.md',
              'book/vol2/kn/full.md', 'book/vol2/eke/full.md',
              'book/vol3/kn/full.md', 'book/vol3/eke/full.md',
              'book/vol4/kn/full.md', 'book/vol4/eke/full.md',
              'youtube/kn/full.md', 'youtube/eke/full.md', 'youtube/en/summary.md',
              'web/kn/full.md',     'web/eke/full.md',   'web/en/summary.md',
          ]

          total_ch = total_files = 0
          for book_dir in sorted(os.listdir(DOCS_DNSBHAT)):
              bp = os.path.join(DOCS_DNSBHAT, book_dir)
              if not os.path.isdir(bp):
                  continue
              for rel in CANDIDATES:
                  fp = os.path.join(bp, rel)
                  if os.path.exists(fp):
                      n = split_file(fp)
                      if n:
                          total_ch += n
                          total_files += 1

          # Post-pass: rewrite companion-language links in all generated chN.md files.
          # Patterns handled:
          #   [text](PATH/full)           → [text](PATH/ch0)   when PATH/ch0.md exists
          #   [text](PATH/full#adhyAya-N) → [text](PATH/chN#adhyAya-N)
          #   [text](PATH/full#chN)       → [text](PATH/chN#chN)
          #   [text](PATH/full#sec-N-M)   → [text](PATH/chN#sec-N-M)
          #   [text](PATH/full#sub-N-M-K) → [text](PATH/chN#sub-N-M-K)
          def _anchor_to_chnum(anchor):
              """Extract chapter number from anchor id, or None."""
              m = re.match(r'(?:adhyAya-|ch)(\d+)$', anchor)
              if m: return int(m.group(1))
              m = re.match(r'(?:sec|sub)-(\d+)', anchor)
              if m: return int(m.group(1))
              return None

          def fix_companion_links(ch_path):
              dir0 = os.path.dirname(ch_path)
              with open(ch_path, encoding='utf-8') as f:
                  content = f.read()
              def rewrite_full(m):
                  text, rel_path, anchor = m.group(1), m.group(2), m.group(3)
                  if not rel_path.endswith('/full'):
                      return m.group(0)
                  base = rel_path[:-4]   # strip 'full'
                  ch0_companion = os.path.normpath(os.path.join(dir0, base + 'ch0.md'))
                  if not os.path.exists(ch0_companion):
                      return m.group(0)
                  if not anchor:
                      return '[' + text + '](' + base + 'ch0)'
                  chnum = _anchor_to_chnum(anchor)
                  if chnum is not None:
                      return '[' + text + '](' + base + 'ch' + str(chnum) + '#' + anchor + ')'
                  return '[' + text + '](' + base + 'ch0#' + anchor + ')'
              # Match both [text](path/full) and [text](path/full#anchor)
              new_content = re.sub(
                  r'\[([^\]]+)\]\(([^)#\s]+/full)(?:#([^)]+))?\)',
                  rewrite_full, content)
              if new_content != content:
                  with open(ch_path, 'w', encoding='utf-8') as f:
                      f.write(new_content)

          for book_dir in sorted(os.listdir(DOCS_DNSBHAT)):
              bp = os.path.join(DOCS_DNSBHAT, book_dir)
              if not os.path.isdir(bp):
                  continue
              for root, _dirs, files in os.walk(bp):
                  for fname in files:
                      if re.match(r'ch\d+\.md$', fname):
                          fix_companion_links(os.path.join(root, fname))

          # Also split standalone top-level .md files (e.g. PROJECT-PHASES.md).
          # Chapter pages go into a subdirectory named after the file (no extension).
          STANDALONE = ['PROJECT-PHASES.md']
          for fname in STANDALONE:
              fp = os.path.join(DOCS_DNSBHAT, fname)
              if os.path.exists(fp):
                  stem = os.path.splitext(fname)[0]
                  out_sub = os.path.join(DOCS_DNSBHAT, stem)
                  os.makedirs(out_sub, exist_ok=True)
                  n = split_file(fp, out_dir=out_sub)
                  if n:
                      total_ch += n
                      total_files += 1
          # Split Reflection topic files — chapter pages go into per-file subdirectories
          DOCS_REFLECTION = 'docs/Reflection'
          if os.path.isdir(DOCS_REFLECTION):
              for fname in sorted(os.listdir(DOCS_REFLECTION)):
                  if not fname.endswith('.md') or fname == 'index.md':
                      continue
                  fp = os.path.join(DOCS_REFLECTION, fname)
                  stem = os.path.splitext(fname)[0]
                  out_sub = os.path.join(DOCS_REFLECTION, stem)
                  os.makedirs(out_sub, exist_ok=True)
                  n = split_file(fp, out_dir=out_sub)
                  if n:
                      total_ch += n
                      total_files += 1
          print(f"Chapter split: {total_ch} chapter pages across {total_files} source files.")
          PYEOF

      - name: Generate sidebar — DNS Bhat and Eke
        run: |
          python3 - <<'PYEOF'
          import os, re

          KANNADADIR = 'docs/kannaDa'
          DNSBHAT    = 'docs/kannaDa/dnsbhat'
          EKEDIR     = 'docs/kannaDa/eke'

          # Title constants
          KANNADA_TITLE  = 'ಕನ್ನಡ'   # L1 root section
          DNSBHAT_TITLE  = 'DNS Bhat'
          EKE_TITLE      = 'Eke'
          KN_TITLE       = 'ಕನ್ನಡ'   # language label (same string, different role)
          EKE_LANG_TITLE = 'ಏಕೆ'    # Kannada script for Eke language variant

          # Sources: (dir_key, sidebar_label, nav_order)
          SOURCES = [
              ('book',    'Books',   1),
              ('web',     'Blog',    2),
              ('youtube', 'YouTube', 3),
              ('stub',    'Stubs',   4),
          ]
          SRC_LABEL = {s: t for s, t, _ in SOURCES}
          SRC_ORDER = {s: o for s, t, o in SOURCES}

          # Languages: (lang_key, sidebar_label, nav_order)
          LANGS = [
              ('kn',  KN_TITLE,       1),
              ('eke', EKE_LANG_TITLE, 2),
              ('en',  'English',      3),
          ]
          LANG_TITLE = {l: t for l, t, _ in LANGS}
          LANG_ORDER = {l: o for l, t, o in LANGS}
          LANG_ICON  = {'kn': 'ಕ', 'en': '🇺🇸', 'eke': '🇮🇳'}

          # Content-file candidates per (source, lang)
          # ch0.md (chapter index) is preferred over full.md when chapters exist
          CANDIDATES = {
              ('book',    'kn'):  ['book/kn/ch0.md', 'book/kn/full.md',
                                   'book/vol1/kn/ch0.md', 'book/vol1/kn/full.md',
                                   'book/vol2/kn/ch0.md', 'book/vol2/kn/full.md',
                                   'book/vol3/kn/ch0.md', 'book/vol3/kn/full.md',
                                   'book/vol4/kn/ch0.md', 'book/vol4/kn/full.md'],
              ('book',    'eke'): ['book/eke/ch0.md', 'book/eke/full.md',
                                   'book/vol1/eke/ch0.md', 'book/vol1/eke/full.md',
                                   'book/vol2/eke/ch0.md', 'book/vol2/eke/full.md',
                                   'book/vol3/eke/ch0.md', 'book/vol3/eke/full.md',
                                   'book/vol4/eke/ch0.md', 'book/vol4/eke/full.md'],
              ('book',    'en'):  ['book/en/summary.md'],
              ('web',     'kn'):  ['web/kn/full.md', 'web/kn/raw.md'],
              ('web',     'eke'): ['web/eke/full.md'],
              ('web',     'en'):  ['web/en/summary.md'],
              ('youtube', 'kn'):  ['youtube/kn/full.md'],
              ('youtube', 'eke'): ['youtube/eke/full.md'],
              ('youtube', 'en'):  ['youtube/en/summary.md'],
          }

          def fm(**fields):
              lines = ['---']
              for k, v in fields.items():
                  if isinstance(v, list):
                      lines.append(f'{k}:')
                      for item in v:
                          lines.append(f'  - {item}')
                  elif isinstance(v, str):
                      lines.append(f'{k}: "{v}"')
                  else:
                      lines.append(f'{k}: {str(v).lower()}')
              lines.append('---\n')
              return '\n'.join(lines)

          def strip_fm(text):
              m = re.match(r'^---\n.*?\n---\n\n?', text, re.DOTALL)
              return text[m.end():] if m else text

          def read_field(fm_text, key):
              m = re.search(rf'^{key}:\s*\"?(.+?)\"?\s*$', fm_text, re.MULTILINE)
              return m.group(1).strip('"') if m else None

          def get_redirect_from(content):
              if not content.startswith('---\n'):
                  return None
              m = re.match(r'^---\n(.*?)\n---\n', content, re.DOTALL)
              if not m:
                  return None
              rf_m = re.search(r'^redirect_from:\n((?:  - .+\n?)+)', m.group(1), re.MULTILINE)
              if rf_m:
                  return re.findall(r'  - (.+)', rf_m.group(0))
              return None

          def add_nav_exclude(fp):
              with open(fp, encoding='utf-8') as f:
                  content = f.read()
              if 'nav_exclude: true' in content[:300]:
                  return
              if content.startswith('---\n'):
                  content = '---\nnav_exclude: true\n' + content[4:]
              else:
                  content = '---\nnav_exclude: true\n---\n\n' + content
              with open(fp, 'w', encoding='utf-8') as f:
                  f.write(content)

          def url(rel):
              return rel[:-3] if rel and rel.endswith('.md') else rel

          def is_youtube_stub(fp):
              try:
                  with open(fp, encoding='utf-8') as f:
                      content = f.read()
                  return not re.search(r'^#{2,3} Part\b', content, re.MULTILINE)
              except OSError:
                  return True

          def stub_lang(fp):
              try:
                  with open(fp, encoding='utf-8') as f:
                      body = strip_fm(f.read())
                  return 'kn' if sum(1 for c in body if '\u0C80' <= c <= '\u0CFF') > 50 else 'en'
              except OSError:
                  return 'kn'

          sidebar_files = set()

          # ── Pre-pass A: ಕನ್ನಡ — L1 root section ──────────────────────────────────
          kannada_index = os.path.join(KANNADADIR, 'index.md')
          if os.path.exists(kannada_index):
              with open(kannada_index, encoding='utf-8') as f:
                  kn_body = strip_fm(f.read())
              with open(kannada_index, 'w', encoding='utf-8') as f:
                  f.write(fm(title=KANNADA_TITLE, nav_order=2, has_children=True))
                  f.write(kn_body)
              sidebar_files.add(kannada_index)

          # ── Pre-pass B: DNS Bhat — L2 under ಕನ್ನಡ ──────────────────────────────
          dnsbhat_index = os.path.join(DNSBHAT, 'index.md')
          if os.path.exists(dnsbhat_index):
              with open(dnsbhat_index, encoding='utf-8') as f:
                  original_body = strip_fm(f.read())
              with open(dnsbhat_index, 'w', encoding='utf-8') as f:
                  f.write(fm(title=DNSBHAT_TITLE,
                             parent=KANNADA_TITLE,
                             nav_order=1, has_children=True,
                             redirect_from=['/dnsbhat/', '/dnsbhat/index']))
                  f.write(original_body)
              sidebar_files.add(dnsbhat_index)

          # ── Pass 1: Gather book metadata and content-file paths ───────────────────
          books = []
          for book_dir in sorted(os.listdir(DNSBHAT)):
              book_path = os.path.join(DNSBHAT, book_dir)
              if not os.path.isdir(book_path):
                  continue
              _meta_candidates = [
                  os.path.join(book_path, 'youtube', 'kn', 'full.md'),
                  os.path.join(book_path, 'book', 'kn', 'full.md'),
                  os.path.join(book_path, 'book', 'vol1', 'kn', 'full.md'),
                  os.path.join(book_path, 'book', 'en', 'summary.md'),
                  os.path.join(book_path, 'book', 'kn', 'raw.md'),
              ]
              main_md = next((p for p in _meta_candidates if os.path.exists(p)), None)
              if main_md is None:
                  continue
              with open(main_md, encoding='utf-8') as f:
                  orig = f.read()
              if not orig.startswith('---'):
                  continue
              fm_match = re.match(r'^---\n(.*?)\n---\n\n?', orig, re.DOTALL)
              if not fm_match:
                  continue
              fm_text    = fm_match.group(1)
              book_title = read_field(fm_text, 'title') or book_dir
              raw_order  = int(read_field(fm_text, 'nav_order') or 0)
              book_num   = raw_order % 100   # 101→1, 124→24
              found = {}
              for (src, lang), candidates in CANDIDATES.items():
                  for rel in candidates:
                      fp = os.path.join(book_path, rel)
                      if os.path.exists(fp):
                          found[(src, lang)] = (fp, rel)
                          break
              yt_kn = found.get(('youtube', 'kn'))
              if yt_kn and is_youtube_stub(yt_kn[0]):
                  has_real = any(s != 'youtube' for (s, _) in found)
                  if not has_real:
                      found[('stub', stub_lang(yt_kn[0]))] = yt_kn
                  del found[('youtube', 'kn')]
                  found.pop(('youtube', 'en'),  None)
                  found.pop(('youtube', 'eke'), None)
              books.append({
                  'dir':            book_dir,
                  'path':           book_path,
                  'title':          book_title,
                  'raw_order':      raw_order,
                  'book_num':       book_num,
                  'found':          found,
                  'orig_redirects': get_redirect_from(orig),
              })

          # ── Pass 2: Book index pages — nav_exclude; body = link table ─────────────
          # Reachable via links in L3 language section pages.
          for b in books:
              readme_src = os.path.join(b['path'], 'README.md')
              if not os.path.exists(readme_src):
                  continue
              with open(readme_src, encoding='utf-8') as f:
                  readme = f.read()
              m = re.search(r'^# \d+ — (.+)$', readme, re.MULTILINE)
              kn_title    = m.group(1).strip() if m else ''
              m = re.search(r'^\*\*([^*\n]+)\*\*', readme, re.MULTILINE)
              en_title    = m.group(1) if m else ''
              m = re.search(r'^> (.+)$', readme, re.MULTILINE)
              desc_line   = m.group(1) if m else ''
              m = re.search(r'^\*\*((?:✅|⚠️)[^\n]+)\*\*', readme, re.MULTILINE)
              status_line = m.group(1) if m else ''
              link_rows = []
              for src_dir, src_lbl, _ in SOURCES:
                  for lang_dir in ['kn', 'eke', 'en']:
                      if (src_dir, lang_dir) in b['found']:
                          _, rel = b['found'][(src_dir, lang_dir)]
                          link_rows.append(
                              f'| {LANG_ICON[lang_dir]} {src_lbl}'
                              f' | [{LANG_TITLE[lang_dir]}](./{url(rel)}) |')
              web_raw = os.path.join(b['path'], 'web', 'kn', 'raw.md')
              if os.path.exists(web_raw) and ('web', 'kn') not in b['found']:
                  link_rows.append(f'| 📝 Blog raw | [{KN_TITLE} raw](./web/kn/raw) |')
              body_parts = []
              if kn_title:    body_parts.append(f'# {kn_title}\n')
              if en_title:    body_parts.append(f'**{en_title}**\n')
              if desc_line:   body_parts.append(f'\n> {desc_line}\n')
              if status_line: body_parts.append(f'\n*{status_line}*\n')
              if link_rows:
                  body_parts.append('\n---\n\n| Source | Link |\n|--------|------|\n')
                  body_parts.extend(r + '\n' for r in link_rows)
              old_landing = '/dnsbhat/' + b['dir'] + '/'
              redirects   = list(b['orig_redirects'] or [])
              if old_landing not in redirects:
                  redirects.append(old_landing)
              index_md = os.path.join(b['path'], 'index.md')
              with open(index_md, 'w', encoding='utf-8') as f:
                  f.write(fm(title=b['title'], nav_exclude=True, redirect_from=redirects))
                  f.write(''.join(body_parts))
              # NOT added to sidebar_files — nav_excluded

          # ── Pass 3: Source L3 section pages (language cols merged inline) ──────────
          # Sidebar:
          #   ಕನ್ನಡ (L1)
          #   └── DNS Bhat (L2)
          #       ├── Books   (L3, parent=DNS Bhat, grand_parent=ಕನ್ನಡ)
          #       ├── Blog    (L3)
          #       ├── YouTube (L3)
          #       └── Stubs   (L3)
          # Language split (ಕನ್ನಡ/ಏಕೆ/English) is shown as table columns within L3 page.
          for src_dir, src_title, src_order in SOURCES:
              # Collect all books that have any content for this source
              src_books = []
              for b in books:
                  row = {'num': b['book_num'], 'title': b['title'], 'dir': b['dir'], 'links': {}}
                  for lang in ['kn', 'eke', 'en']:
                      if (src_dir, lang) in b['found']:
                          _, rel = b['found'][(src_dir, lang)]
                          row['links'][lang] = f'./{b["dir"]}/{url(rel)}'
                  if row['links']:
                      src_books.append(row)
              if not src_books:
                  continue
              src_books.sort(key=lambda x: x['num'])
              # Determine which language columns actually have content
              langs_present = [l for l in ['kn', 'eke', 'en']
                               if any(l in row['links'] for row in src_books)]
              # L3 source page
              src_file = os.path.join(DNSBHAT, f'{src_dir}.md')
              with open(src_file, 'w', encoding='utf-8') as f:
                  f.write(fm(title=src_title, parent=DNSBHAT_TITLE,
                             grand_parent=KANNADA_TITLE, nav_order=src_order))
                  f.write(f'# {src_title}\n\n')
                  # Header row
                  lang_cols = ' | '.join(LANG_TITLE[l] for l in langs_present)
                  sep_cols  = ' | '.join('---' for _ in langs_present)
                  f.write(f'| # | Title | {lang_cols} |\n')
                  f.write(f'|---|-------|{sep_cols}|\n')
                  for row in src_books:
                      cells = []
                      for lang in langs_present:
                          lnk = row['links'].get(lang)
                          cells.append(f'[{LANG_TITLE[lang]}]({lnk})' if lnk else '—')
                      f.write(f'| {row["num"]} | {row["title"]} | {" | ".join(cells)} |\n')
              sidebar_files.add(src_file)
              # Remove stale per-language files from previous runs
              for lang in ['kn', 'eke', 'en']:
                  stale = os.path.join(DNSBHAT, f'{src_dir}-{lang}.md')
                  if os.path.exists(stale):
                      os.remove(stale)

          # ── Pass 4: Eke — L2 under ಕನ್ನಡ + L3 child pages ────────────────────────
          if os.path.isdir(EKEDIR):
              eke_readme = os.path.join(EKEDIR, 'README.md')
              eke_index  = os.path.join(EKEDIR, 'index.md')
              if os.path.exists(eke_readme) and not os.path.exists(eke_index):
                  os.rename(eke_readme, eke_index)
              if os.path.exists(eke_index):
                  with open(eke_index, encoding='utf-8') as f:
                      body = strip_fm(f.read())
                  with open(eke_index, 'w', encoding='utf-8') as f:
                      f.write(fm(title=EKE_TITLE, parent=KANNADA_TITLE,
                                 nav_order=2, has_children=True))
                      f.write(body)
                  sidebar_files.add(eke_index)
              # reference.md, motivation.md, script-history.md → L3 under Eke
              page_nav_map = {'reference': 1, 'motivation': 2, 'script-history': 3}
              for fname in sorted(os.listdir(EKEDIR)):
                  if not fname.endswith('.md') or fname in ('index.md', 'README.md'):
                      continue
                  fp = os.path.join(EKEDIR, fname)
                  with open(fp, encoding='utf-8') as f:
                      content = f.read()
                  page_title = fname.replace('.md', '').replace('-', ' ').title()
                  existing_fm = re.match(r'^---\n(.*?)\n---\n', content, re.DOTALL)
                  if existing_fm:
                      t = read_field(existing_fm.group(1), 'title')
                      if t:
                          page_title = t
                  page_nav = page_nav_map.get(fname.replace('.md', ''), 99)
                  body = strip_fm(content)
                  with open(fp, 'w', encoding='utf-8') as f:
                      f.write(fm(title=page_title, parent=EKE_TITLE,
                                 grand_parent=KANNADA_TITLE, nav_order=page_nav))
                      f.write(body)
                  sidebar_files.add(fp)

          # ── Pass 4b: Grammar paradigm pages — L2 under DNS Bhat sibling section ──────
          GRAMMARDIR   = 'docs/kannaDa/grammar'
          GRAMMAR_TITLE = 'Verb Paradigms'
          GRAMMAR_PAGES = [
              ('mADu-verb-paradigm', 'ಮಾಡು — Regular Verb (36 forms)', 1, 'mADu-illustrated.html'),
              ('iru-verb-paradigm',  'ಇರು — to be (42 forms)',          2, 'iru-illustrated.html'),
              ('illa-verb-paradigm', 'ಇಲ್ಲ — Negator (5 forms)',        3, 'illa-illustrated.html'),
          ]
          if os.path.isdir(GRAMMARDIR):
              # Root index page — L2 under ಕನ್ನಡ
              idx = os.path.join(GRAMMARDIR, 'index.md')
              if os.path.exists(idx):
                  with open(idx, encoding='utf-8') as f:
                      body = strip_fm(f.read())
                  body = re.sub(r'\]\(((?!http)[^)]+)\.md\)', r'](\1)', body)
                  with open(idx, 'w', encoding='utf-8') as f:
                      f.write(fm(title=GRAMMAR_TITLE, parent=KANNADA_TITLE,
                                 nav_order=3, has_children=True))
                      f.write(body)
                  sidebar_files.add(idx)
              # Child pages — L3 (parent=Grammar, grand_parent=ಕನ್ನಡ)
              for slug, title, nav, redirect in GRAMMAR_PAGES:
                  fp = os.path.join(GRAMMARDIR, f'{slug}.md')
                  if not os.path.exists(fp):
                      continue
                  with open(fp, encoding='utf-8') as f:
                      body = strip_fm(f.read())
                  body = re.sub(r'\]\(((?!http)[^)]+)\.md\)', r'](\1)', body)
                  with open(fp, 'w', encoding='utf-8') as f:
                      extra = {'redirect_to': redirect} if redirect else {}
                      f.write(fm(title=title, parent=GRAMMAR_TITLE,
                                 grand_parent=KANNADA_TITLE, nav_order=nav, **extra))
                      f.write(body)
                  sidebar_files.add(fp)

          # ── Pass 5: Books catalog — L1 sidebar entry, individual files nav_excluded ─
          BOOKSDIR = 'docs/Books'
          books_index = os.path.join(BOOKSDIR, 'Books.md')
          if os.path.exists(books_index):
              with open(books_index, encoding='utf-8') as f:
                  body = strip_fm(f.read())
              # Strip .md from relative internal links so Jekyll resolves them correctly
              body = re.sub(r'\]\(((?!http)[^)]+)\.md\)', r'](\1)', body)
              # Fix stale cross-refs to DNS Bhat content
              body = body.replace('../kannada/dnsbhat/', '../kannaDa/dnsbhat/')
              with open(books_index, 'w', encoding='utf-8') as f:
                  f.write(fm(title='Books', nav_order=4, has_children=True))
                  f.write(body)
              # Books-Top.md — sidebar child of Books
              books_top = os.path.join(BOOKSDIR, 'Books-Top.md')
              if os.path.exists(books_top):
                  with open(books_top, encoding='utf-8') as f:
                      top_body = strip_fm(f.read())
                  top_body = re.sub(r'\]\(((?!http)[^)]+)\.md\)', r'](\1)', top_body)
                  with open(books_top, 'w', encoding='utf-8') as f:
                      f.write(fm(title='Modern Library Top 100', parent='Books', nav_order=1))
                      f.write(top_body)
              # nav_exclude all individual book files (pages exist; just hidden from sidebar)
              inf_dir = os.path.join(BOOKSDIR, 'influential')
              if os.path.isdir(inf_dir):
                  for fname in os.listdir(inf_dir):
                      if fname.endswith('.md'):
                          add_nav_exclude(os.path.join(inf_dir, fname))

          # ── Pass 6: Functional Programming sidebar ────────────────────────────────
          FPDIR     = 'docs/FP'
          FP_TITLE  = 'Functional Programming'

          FP_ARTICLES = [
              ('om-lambda.md',               'ॐλ — Lambda Calculus',       1),
              ('monoids-and-semigroups.md',  'Monoids and Semigroups',      2),
              ('hsom.md',                    'rangapura vihAra',            3),
              ('qsortof.md',                 'Lazy Min-K in Haskell',       4),
              # qsortof-part2.md is references-only, not yet written — nav_excluded
              # haskell-types.md not yet complete — nav_excluded
              ('kumbaLakAyi-kaLLanalla.md',  'ಕಳ್ಳ — Pumpkin Puzzle',       7),
              ('cloud_flowers_and.md',       'Kojo — Clouds and Flowers',   8),
          ]

          if os.path.isdir(FPDIR):
              # Root index page
              idx_path = os.path.join(FPDIR, 'index.md')
              with open(idx_path, 'w', encoding='utf-8') as f:
                  f.write(fm(title=FP_TITLE, nav_order=5, has_children=True))
                  f.write('Functional programming explorations in Haskell, Scala, and lambda calculus — '
                          'including visual programming with Kojo.\n')
              sidebar_files.add(idx_path)

              # Front matter for each article
              for fname, title, nav_order in FP_ARTICLES:
                  fpath = os.path.join(FPDIR, fname)
                  if not os.path.exists(fpath):
                      continue
                  with open(fpath, encoding='utf-8') as f:
                      body = strip_fm(f.read())
                  body = re.sub(r'\]\(((?!http)[^)]+)\.md\)', r'](\1)', body)
                  with open(fpath, 'w', encoding='utf-8') as f:
                      f.write(fm(title=title, parent=FP_TITLE, nav_order=nav_order))
                      f.write(body)
                  sidebar_files.add(fpath)

          # ── Pass 7: Reflection sidebar ────────────────────────────────────────────
          REFLDIR    = 'docs/Reflection'
          REFL_TITLE = 'Reflection'

          REFL_CATS = [
              ('kannada.md',                        'Kannada',                      1),
              ('japanese.md',                       'Japanese',                     2),
              ('linguistics.md',                    'Linguistics',                  3),
              ('sanskrit.md',                       'Sanskrit',                     4),
              ('indian-history-culture.md',         'Indian History & Culture',     5),
              ('scala-functional-programming.md',   'Scala & FP',                   6),
              ('machine-learning-ai.md',            'Machine Learning & AI',        7),
              ('mathematics.md',                    'Mathematics',                  8),
              ('mathematics-science.md',            'Mathematics & Science',        9),
              ('world-history-archaeology.md',      'World History & Archaeology',  10),
              ('algorithms-data-structures.md',     'Algorithms & Data Structures', 11),
              ('infrastructure-devops.md',          'Infrastructure & DevOps',      12),
              ('data-engineering.md',               'Data Engineering',            13),
              ('health-fitness.md',                 'Health & Fitness',            14),
              ('martial-arts.md',                   'Martial Arts',                15),
              ('books-literature.md',               'Books & Literature',          16),
              ('arts-music-film.md',                'Arts, Music & Film',          17),
              ('cricket-sports.md',                 'Cricket & Sports',            18),
              ('travel-outdoors.md',                'Travel & Outdoors',           19),
              # career-personal.md — filtered for now (too personal)
              # current-events-politics.md — filtered for now
              ('miscellaneous.md',                  'Miscellaneous',               20),
          ]

          if os.path.isdir(REFLDIR):
              idx_path = os.path.join(REFLDIR, 'index.md')
              with open(idx_path, 'w', encoding='utf-8') as f:
                  f.write(fm(title=REFL_TITLE, nav_order=6, has_children=True))
                  f.write('Personal notes distilled from years of reading, thinking, and bookmarking — '
                          'organised by topic.\n')
              sidebar_files.add(idx_path)

              for fname, title, nav_order in REFL_CATS:
                  fpath = os.path.join(REFLDIR, fname)
                  if not os.path.exists(fpath):
                      continue
                  stem = os.path.splitext(fname)[0]
                  ch0_path = os.path.join(REFLDIR, stem, 'ch0.md')
                  ch1_path = os.path.join(REFLDIR, stem, 'ch1.md')
                  if os.path.exists(ch1_path):
                      # Land on ch1 directly — ch0 is blank for Reflection files
                      # (no preamble text before the first anchor).
                      with open(ch1_path, encoding='utf-8') as f:
                          body = strip_fm(f.read())
                      # ch0 refs → parent Reflection index; chN refs → stem/chN
                      body = re.sub(r'\(ch0\)', '(../)', body)
                      body = re.sub(r'\]\(ch(\d+)\)', lambda m: f']({stem}/ch{m.group(1)})', body)
                  elif os.path.exists(ch0_path):
                      with open(ch0_path, encoding='utf-8') as f:
                          body = strip_fm(f.read())
                      body = re.sub(r'\]\(ch(\d+)\)', lambda m: f']({stem}/ch{m.group(1)})', body)
                  else:
                      with open(fpath, encoding='utf-8') as f:
                          body = strip_fm(f.read())
                  body = re.sub(r'\]\(((?!http)[^)]+)\.md\)', r'](\1)', body)
                  with open(fpath, 'w', encoding='utf-8') as f:
                      f.write(fm(title=title, parent=REFL_TITLE, nav_order=nav_order))
                      f.write(body)
                  sidebar_files.add(fpath)

                  # Fix ch0 refs in chapter subfiles (ch1, ch2, ch3…) so
                  # "Contents" links point to the category landing page, not blank ch0
                  sub_dir = os.path.join(REFLDIR, stem)
                  if os.path.isdir(sub_dir):
                      for chf in sorted(os.listdir(sub_dir)):
                          if re.match(r'ch[1-9]\d*\.md', chf):
                              chfp = os.path.join(sub_dir, chf)
                              with open(chfp, encoding='utf-8') as f:
                                  ch_content = f.read()
                              updated = re.sub(r'\(ch0\)', '(../)', ch_content)
                              if updated != ch_content:
                                  with open(chfp, 'w', encoding='utf-8') as f:
                                      f.write(updated)

          # ── Pass 8: nav_exclude all remaining .md files in all docs/ sections ─────
          for scan_root in [KANNADADIR, FPDIR, REFLDIR]:
              if not os.path.isdir(scan_root):
                  continue
              for walk_root, dirs, files in os.walk(scan_root):
                  dirs[:] = [d for d in dirs if not d.startswith('.')]
                  for fname in files:
                      if fname.endswith('.md'):
                          fp = os.path.join(walk_root, fname)
                          if fp not in sidebar_files:
                              add_nav_exclude(fp)

          src_pages  = sum(1 for s, _, _ in SOURCES
                           if os.path.exists(os.path.join(DNSBHAT, f'{s}.md')))
          lang_pages = sum(1 for s, _, _ in SOURCES
                           for l in ['kn', 'eke', 'en']
                           if os.path.exists(os.path.join(DNSBHAT, f'{s}-{l}.md')))
          print(f"Sidebar: DNS Bhat (L1) + {src_pages} source sections (L2) + "
                f"{lang_pages} language pages (L3) + Eke (L1) with "
                f"{len([f for f in sidebar_files if EKEDIR in f and f != os.path.join(EKEDIR,'index.md')])} child pages; "
                f"{len(books)} books catalogued.")
          PYEOF

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs

      - name: Setup Pages
        id: setup-pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.setup-pages.outputs.base_path }}"
        working-directory: docs
        env:
          JEKYLL_ENV: production

      - name: Index with Pagefind
        run: npx --yes pagefind --site docs/_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
