
name: Build and deploy Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy Kannada markdown sources into docs/kannaDa/
        run: |
          rm -rf docs/kannaDa docs/dnsbhat || true
          mkdir -p docs/kannaDa/dnsbhat docs/kannaDa/eke
          cp -R src/main/md/kannada/dnsbhat/. docs/kannaDa/dnsbhat/
          cp -R src/main/md/kannada/eke/. docs/kannaDa/eke/
          # README.md → index.md for dnsbhat (nav_exclude set by Python script)
          if [ -f docs/kannaDa/dnsbhat/README.md ]; then
            mv docs/kannaDa/dnsbhat/README.md docs/kannaDa/dnsbhat/index.md
          fi

      - name: Copy Books catalog into docs/Books/
        run: |
          rm -rf docs/Books || true
          mkdir -p docs/Books/influential
          cp src/main/md/Books/Books.md docs/Books/Books.md
          cp src/main/md/Books/influential/*.md docs/Books/influential/

      - name: Generate sidebar — DNS Bhat and Eke
        run: |
          python3 - <<'PYEOF'
          import os, re

          KANNADADIR = 'docs/kannaDa'
          DNSBHAT    = 'docs/kannaDa/dnsbhat'
          EKEDIR     = 'docs/kannaDa/eke'

          # Title constants
          DNSBHAT_TITLE  = 'DNS Bhat'
          EKE_TITLE      = 'Eke'
          KN_TITLE       = 'ಕನ್ನಡ'   # pure Kannada script — language label
          EKE_LANG_TITLE = 'ಏಕೆ'    # Kannada script for Eke language variant

          # Sources: (dir_key, sidebar_label, nav_order)
          SOURCES = [
              ('book',    'Books',   1),
              ('web',     'Blog',    2),
              ('youtube', 'YouTube', 3),
              ('stub',    'Stubs',   4),
          ]
          SRC_LABEL = {s: t for s, t, _ in SOURCES}
          SRC_ORDER = {s: o for s, t, o in SOURCES}

          # Languages: (lang_key, sidebar_label, nav_order)
          LANGS = [
              ('kn',  KN_TITLE,       1),
              ('eke', EKE_LANG_TITLE, 2),
              ('en',  'English',      3),
          ]
          LANG_TITLE = {l: t for l, t, _ in LANGS}
          LANG_ORDER = {l: o for l, t, o in LANGS}
          LANG_ICON  = {'kn': 'ಕ', 'en': '🇺🇸', 'eke': '🇮🇳'}

          # Content-file candidates per (source, lang)
          CANDIDATES = {
              ('book',    'kn'):  ['book/kn/full.md', 'book/vol1/kn/full.md', 'book/vol2/kn/full.md', 'book/vol3/kn/full.md', 'book/vol4/kn/full.md'],
              ('book',    'eke'): ['book/eke/full.md', 'book/vol1/eke/full.md', 'book/vol2/eke/full.md', 'book/vol3/eke/full.md'],
              ('book',    'en'):  ['book/en/summary.md'],
              ('web',     'kn'):  ['web/kn/full.md', 'web/kn/raw.md'],
              ('web',     'eke'): ['web/eke/full.md'],
              ('web',     'en'):  ['web/en/summary.md'],
              ('youtube', 'kn'):  ['youtube/kn/full.md'],
              ('youtube', 'eke'): ['youtube/eke/full.md'],
              ('youtube', 'en'):  ['youtube/en/summary.md'],
          }

          def fm(**fields):
              lines = ['---']
              for k, v in fields.items():
                  if isinstance(v, list):
                      lines.append(f'{k}:')
                      for item in v:
                          lines.append(f'  - {item}')
                  elif isinstance(v, str):
                      lines.append(f'{k}: "{v}"')
                  else:
                      lines.append(f'{k}: {str(v).lower()}')
              lines.append('---\n')
              return '\n'.join(lines)

          def strip_fm(text):
              m = re.match(r'^---\n.*?\n---\n\n?', text, re.DOTALL)
              return text[m.end():] if m else text

          def read_field(fm_text, key):
              m = re.search(rf'^{key}:\s*\"?(.+?)\"?\s*$', fm_text, re.MULTILINE)
              return m.group(1).strip('"') if m else None

          def get_redirect_from(content):
              if not content.startswith('---\n'):
                  return None
              m = re.match(r'^---\n(.*?)\n---\n', content, re.DOTALL)
              if not m:
                  return None
              rf_m = re.search(r'^redirect_from:\n((?:  - .+\n?)+)', m.group(1), re.MULTILINE)
              if rf_m:
                  return re.findall(r'  - (.+)', rf_m.group(0))
              return None

          def add_nav_exclude(fp):
              with open(fp, encoding='utf-8') as f:
                  content = f.read()
              if 'nav_exclude: true' in content[:300]:
                  return
              if content.startswith('---\n'):
                  content = '---\nnav_exclude: true\n' + content[4:]
              else:
                  content = '---\nnav_exclude: true\n---\n\n' + content
              with open(fp, 'w', encoding='utf-8') as f:
                  f.write(content)

          def url(rel):
              return rel[:-3] if rel and rel.endswith('.md') else rel

          def is_youtube_stub(fp):
              try:
                  with open(fp, encoding='utf-8') as f:
                      content = f.read()
                  return not re.search(r'^#{2,3} Part\b', content, re.MULTILINE)
              except OSError:
                  return True

          def stub_lang(fp):
              try:
                  with open(fp, encoding='utf-8') as f:
                      body = strip_fm(f.read())
                  return 'kn' if sum(1 for c in body if '\u0C80' <= c <= '\u0CFF') > 50 else 'en'
              except OSError:
                  return 'kn'

          sidebar_files = set()

          # ── Pre-pass A: nav_exclude ಕನ್ನಡ wrapper (branding page, not sidebar) ──
          kannada_index = os.path.join(KANNADADIR, 'index.md')
          if os.path.exists(kannada_index):
              add_nav_exclude(kannada_index)

          # ── Pre-pass B: DNS Bhat — L1 root section (no parent) ────────────────────
          dnsbhat_index = os.path.join(DNSBHAT, 'index.md')
          if os.path.exists(dnsbhat_index):
              with open(dnsbhat_index, encoding='utf-8') as f:
                  original_body = strip_fm(f.read())
              with open(dnsbhat_index, 'w', encoding='utf-8') as f:
                  f.write(fm(title=DNSBHAT_TITLE,
                             nav_order=2, has_children=True,
                             redirect_from=['/dnsbhat/', '/dnsbhat/index']))
                  f.write(original_body)
              sidebar_files.add(dnsbhat_index)

          # ── Pass 1: Gather book metadata and content-file paths ───────────────────
          books = []
          for book_dir in sorted(os.listdir(DNSBHAT)):
              book_path = os.path.join(DNSBHAT, book_dir)
              if not os.path.isdir(book_path):
                  continue
              _meta_candidates = [
                  os.path.join(book_path, 'youtube', 'kn', 'full.md'),
                  os.path.join(book_path, 'book', 'kn', 'full.md'),
                  os.path.join(book_path, 'book', 'vol1', 'kn', 'full.md'),
                  os.path.join(book_path, 'book', 'en', 'summary.md'),
                  os.path.join(book_path, 'book', 'kn', 'raw.md'),
              ]
              main_md = next((p for p in _meta_candidates if os.path.exists(p)), None)
              if main_md is None:
                  continue
              with open(main_md, encoding='utf-8') as f:
                  orig = f.read()
              if not orig.startswith('---'):
                  continue
              fm_match = re.match(r'^---\n(.*?)\n---\n\n?', orig, re.DOTALL)
              if not fm_match:
                  continue
              fm_text    = fm_match.group(1)
              book_title = read_field(fm_text, 'title') or book_dir
              raw_order  = int(read_field(fm_text, 'nav_order') or 0)
              book_num   = raw_order % 100   # 101→1, 124→24
              found = {}
              for (src, lang), candidates in CANDIDATES.items():
                  for rel in candidates:
                      fp = os.path.join(book_path, rel)
                      if os.path.exists(fp):
                          found[(src, lang)] = (fp, rel)
                          break
              yt_kn = found.get(('youtube', 'kn'))
              if yt_kn and is_youtube_stub(yt_kn[0]):
                  has_real = any(s != 'youtube' for (s, _) in found)
                  if not has_real:
                      found[('stub', stub_lang(yt_kn[0]))] = yt_kn
                  del found[('youtube', 'kn')]
                  found.pop(('youtube', 'en'),  None)
                  found.pop(('youtube', 'eke'), None)
              books.append({
                  'dir':            book_dir,
                  'path':           book_path,
                  'title':          book_title,
                  'raw_order':      raw_order,
                  'book_num':       book_num,
                  'found':          found,
                  'orig_redirects': get_redirect_from(orig),
              })

          # ── Pass 2: Book index pages — nav_exclude; body = link table ─────────────
          # Reachable via links in L3 language section pages.
          for b in books:
              readme_src = os.path.join(b['path'], 'README.md')
              if not os.path.exists(readme_src):
                  continue
              with open(readme_src, encoding='utf-8') as f:
                  readme = f.read()
              m = re.search(r'^# \d+ — (.+)$', readme, re.MULTILINE)
              kn_title    = m.group(1).strip() if m else ''
              m = re.search(r'^\*\*([^*\n]+)\*\*', readme, re.MULTILINE)
              en_title    = m.group(1) if m else ''
              m = re.search(r'^> (.+)$', readme, re.MULTILINE)
              desc_line   = m.group(1) if m else ''
              m = re.search(r'^\*\*((?:✅|⚠️)[^\n]+)\*\*', readme, re.MULTILINE)
              status_line = m.group(1) if m else ''
              link_rows = []
              for src_dir, src_lbl, _ in SOURCES:
                  for lang_dir in ['kn', 'eke', 'en']:
                      if (src_dir, lang_dir) in b['found']:
                          _, rel = b['found'][(src_dir, lang_dir)]
                          link_rows.append(
                              f'| {LANG_ICON[lang_dir]} {src_lbl}'
                              f' | [{LANG_TITLE[lang_dir]}](./{url(rel)}) |')
              web_raw = os.path.join(b['path'], 'web', 'kn', 'raw.md')
              if os.path.exists(web_raw) and ('web', 'kn') not in b['found']:
                  link_rows.append(f'| 📝 Blog raw | [{KN_TITLE} raw](./web/kn/raw) |')
              body_parts = []
              if kn_title:    body_parts.append(f'# {kn_title}\n')
              if en_title:    body_parts.append(f'**{en_title}**\n')
              if desc_line:   body_parts.append(f'\n> {desc_line}\n')
              if status_line: body_parts.append(f'\n*{status_line}*\n')
              if link_rows:
                  body_parts.append('\n---\n\n| Source | Link |\n|--------|------|\n')
                  body_parts.extend(r + '\n' for r in link_rows)
              old_landing = '/dnsbhat/' + b['dir'] + '/'
              redirects   = list(b['orig_redirects'] or [])
              if old_landing not in redirects:
                  redirects.append(old_landing)
              index_md = os.path.join(b['path'], 'index.md')
              with open(index_md, 'w', encoding='utf-8') as f:
                  f.write(fm(title=b['title'], nav_exclude=True, redirect_from=redirects))
                  f.write(''.join(body_parts))
              # NOT added to sidebar_files — nav_excluded

          # ── Pass 3: Source L2 + Language L3 section pages ────────────────────────
          # Sidebar:
          #   DNS Bhat (L1)
          #   ├── Books   (L2, parent=DNS Bhat)  →  ಕನ್ನಡ / ಏಕೆ / English  (L3)
          #   ├── Blog    (L2)                   →  ಕನ್ನಡ / ಏಕೆ / English  (L3)
          #   ├── YouTube (L2)                   →  …
          #   └── Stubs   (L2)                   →  …
          for src_dir, src_title, src_order in SOURCES:
              lang_rows = {}   # lang → [(book_num, book_title, content_url)]
              for b in books:
                  for lang in ['kn', 'eke', 'en']:
                      if (src_dir, lang) in b['found']:
                          _, rel = b['found'][(src_dir, lang)]
                          link_url = f'./{b["dir"]}/{url(rel)}'
                          lang_rows.setdefault(lang, []).append(
                              (b['book_num'], b['title'], link_url))
              if not lang_rows:
                  continue
              # L2 source page
              src_file = os.path.join(DNSBHAT, f'{src_dir}.md')
              with open(src_file, 'w', encoding='utf-8') as f:
                  f.write(fm(title=src_title, parent=DNSBHAT_TITLE,
                             nav_order=src_order, has_children=True))
                  f.write(f'# {src_title}\n\n')
                  for lang in ['kn', 'eke', 'en']:
                      if lang in lang_rows:
                          f.write(f'- [{LANG_TITLE[lang]}](./{src_dir}-{lang})\n')
              sidebar_files.add(src_file)
              # L3 language pages — sorted book table
              for lang in ['kn', 'eke', 'en']:
                  if lang not in lang_rows:
                      continue
                  rows_sorted = sorted(lang_rows[lang], key=lambda x: x[0])
                  lang_label  = LANG_TITLE[lang]
                  lang_order  = LANG_ORDER[lang]
                  lang_file   = os.path.join(DNSBHAT, f'{src_dir}-{lang}.md')
                  with open(lang_file, 'w', encoding='utf-8') as f:
                      f.write(fm(title=lang_label, parent=src_title,
                                 grand_parent=DNSBHAT_TITLE, nav_order=lang_order))
                      f.write(f'# {src_title} — {lang_label}\n\n')
                      f.write('| # | Title | Link |\n')
                      f.write('|---|-------|------|\n')
                      for num, title, link_url in rows_sorted:
                          f.write(f'| {num} | {title} | [{lang_label}]({link_url}) |\n')
                  sidebar_files.add(lang_file)

          # ── Pass 4: Eke — L1 root section + L2 child pages ───────────────────────
          if os.path.isdir(EKEDIR):
              eke_readme = os.path.join(EKEDIR, 'README.md')
              eke_index  = os.path.join(EKEDIR, 'index.md')
              if os.path.exists(eke_readme) and not os.path.exists(eke_index):
                  os.rename(eke_readme, eke_index)
              if os.path.exists(eke_index):
                  with open(eke_index, encoding='utf-8') as f:
                      body = strip_fm(f.read())
                  with open(eke_index, 'w', encoding='utf-8') as f:
                      f.write(fm(title=EKE_TITLE, nav_order=3, has_children=True))
                      f.write(body)
                  sidebar_files.add(eke_index)
              # reference.md, motivation.md → L2 under Eke (no grand_parent)
              for fname in sorted(os.listdir(EKEDIR)):
                  if not fname.endswith('.md') or fname in ('index.md', 'README.md'):
                      continue
                  fp = os.path.join(EKEDIR, fname)
                  with open(fp, encoding='utf-8') as f:
                      content = f.read()
                  page_title = fname.replace('.md', '').replace('-', ' ').title()
                  existing_fm = re.match(r'^---\n(.*?)\n---\n', content, re.DOTALL)
                  if existing_fm:
                      t = read_field(existing_fm.group(1), 'title')
                      if t:
                          page_title = t
                  page_nav = {'reference': 1, 'motivation': 2}.get(fname.replace('.md', ''), 99)
                  body = strip_fm(content)
                  with open(fp, 'w', encoding='utf-8') as f:
                      f.write(fm(title=page_title, parent=EKE_TITLE, nav_order=page_nav))
                      f.write(body)
                  sidebar_files.add(fp)

          # ── Pass 5: Books catalog — L1 sidebar entry, individual files nav_excluded ─
          BOOKSDIR = 'docs/Books'
          books_index = os.path.join(BOOKSDIR, 'Books.md')
          if os.path.exists(books_index):
              with open(books_index, encoding='utf-8') as f:
                  body = strip_fm(f.read())
              # Strip .md from relative internal links so Jekyll resolves them correctly
              body = re.sub(r'\]\(((?!http)[^)]+)\.md\)', r'](\1)', body)
              # Fix stale cross-refs to DNS Bhat content
              body = body.replace('../kannada/dnsbhat/', '../kannaDa/dnsbhat/')
              with open(books_index, 'w', encoding='utf-8') as f:
                  f.write(fm(title='Books', nav_order=4, has_children=True))
                  f.write(body)
              # nav_exclude all individual book files (pages exist; just hidden from sidebar)
              inf_dir = os.path.join(BOOKSDIR, 'influential')
              if os.path.isdir(inf_dir):
                  for fname in os.listdir(inf_dir):
                      if fname.endswith('.md'):
                          add_nav_exclude(os.path.join(inf_dir, fname))

          # ── Pass 6: nav_exclude all remaining .md files ───────────────────────────
          for walk_root, dirs, files in os.walk(KANNADADIR):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              for fname in files:
                  if fname.endswith('.md'):
                      fp = os.path.join(walk_root, fname)
                      if fp not in sidebar_files:
                          add_nav_exclude(fp)

          src_pages  = sum(1 for s, _, _ in SOURCES
                           if os.path.exists(os.path.join(DNSBHAT, f'{s}.md')))
          lang_pages = sum(1 for s, _, _ in SOURCES
                           for l in ['kn', 'eke', 'en']
                           if os.path.exists(os.path.join(DNSBHAT, f'{s}-{l}.md')))
          print(f"Sidebar: DNS Bhat (L1) + {src_pages} source sections (L2) + "
                f"{lang_pages} language pages (L3) + Eke (L1) with "
                f"{len([f for f in sidebar_files if EKEDIR in f and f != os.path.join(EKEDIR,'index.md')])} child pages; "
                f"{len(books)} books catalogued.")
          PYEOF

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs

      - name: Setup Pages
        id: setup-pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.setup-pages.outputs.base_path }}"
        working-directory: docs
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
