
name: Build and deploy Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy DNS Bhat markdown into docs/
        run: |
          rm -rf docs/dnsbhat || true
          mkdir -p docs/dnsbhat
          cp -R src/main/md/kannada/dnsbhat/. docs/dnsbhat/
          mv docs/dnsbhat/README.md docs/dnsbhat/index.md
          printf -- '---\nlayout: default\ntitle: DNS Bhat\nnav_order: 1\nhas_children: true\n---\n\n' | cat - docs/dnsbhat/index.md > /tmp/dnsbhat_index.md && mv /tmp/dnsbhat_index.md docs/dnsbhat/index.md

      - name: Generate format-first sidebar and book landing pages
        run: |
          python3 - <<'PYEOF'
          import os, re

          DNSBHAT = 'docs/dnsbhat'

          # ── Sidebar section definitions ───────────────────────────────────
          SECTIONS = [
              ('English Summaries',  10, 'english-summaries',
               'English summaries, DNS Bhat blog posts, and lecture guides.'),
              ('Kannada Text',       20, 'kannada-text',
               'Original Kannada text — OCR and book content.'),
              ('Eke Transliteration', 30, 'eke-transliteration',
               'Eke phonemic romanisation — readable without Kannada script.'),
          ]

          def fm(**fields):
              lines = ['---']
              for k, v in fields.items():
                  if isinstance(v, list):
                      lines.append(f'{k}:')
                      for item in v:
                          lines.append(f'  - {item}')
                  elif isinstance(v, str):
                      lines.append(f'{k}: "{v}"')
                  else:
                      lines.append(f'{k}: {str(v).lower()}')
              lines.append('---\n')
              return '\n'.join(lines)

          def strip_fm(text):
              m = re.match(r'^---\n.*?\n---\n\n?', text, re.DOTALL)
              return text[m.end():] if m else text

          def read_field(fm_text, key):
              m = re.search(rf'^{key}:\s*"?(.+?)"?\s*$', fm_text, re.MULTILINE)
              return m.group(1).strip('"') if m else None

          def get_redirect_from(content):
              if not content.startswith('---\n'):
                  return None
              m = re.match(r'^---\n(.*?)\n---\n', content, re.DOTALL)
              if not m:
                  return None
              rf_m = re.search(r'^redirect_from:\n((?:  - .+\n?)+)', m.group(1), re.MULTILINE)
              if rf_m:
                  return re.findall(r'  - (.+)', rf_m.group(0))
              return None

          def add_nav_exclude(fp):
              """Add nav_exclude: true to a file's front matter (or prepend if none)."""
              with open(fp, encoding='utf-8') as f:
                  content = f.read()
              if content.startswith('---\n'):
                  # Already has front matter — add nav_exclude after opening ---
                  content = '---\nnav_exclude: true\n' + content[4:]
              else:
                  content = '---\nnav_exclude: true\n---\n\n' + content
              with open(fp, 'w', encoding='utf-8') as f:
                  f.write(content)

          # Track files that have been given proper sidebar front matter
          sidebar_files = set()
          sidebar_files.add(os.path.join(DNSBHAT, 'index.md'))

          # ── Create section index pages ────────────────────────────────────
          for title, order, fname, desc in SECTIONS:
              fp = os.path.join(DNSBHAT, fname + '.md')
              with open(fp, 'w', encoding='utf-8') as f:
                  f.write(fm(title=title, nav_order=order,
                             has_children=True, nav_exclude=False))
                  f.write(f'# {title}\n\n{desc}\n')
              sidebar_files.add(fp)

          # ── Process each book directory ───────────────────────────────────
          for book_dir in sorted(os.listdir(DNSBHAT)):
              book_path = os.path.join(DNSBHAT, book_dir)
              if not os.path.isdir(book_path):
                  continue

              # ── Get nav metadata from youtube/kn/full.md ─────────────────
              # After Phase B migration, the YouTube assembled file (formerly
              # NN-slug.md) moved to youtube/kn/full.md. It carries title +
              # nav_order front matter used to position books in the sidebar.
              main_md = os.path.join(book_path, 'youtube', 'kn', 'full.md')
              if not os.path.exists(main_md):
                  continue

              with open(main_md, encoding='utf-8') as f:
                  orig = f.read()
              if not orig.startswith('---'):
                  continue
              fm_match = re.match(r'^---\n(.*?)\n---\n\n?', orig, re.DOTALL)
              if not fm_match:
                  continue

              fm_text   = fm_match.group(1)
              body_orig = orig[fm_match.end():]
              book_title = read_field(fm_text, 'title') or book_dir
              raw_order  = int(read_field(fm_text, 'nav_order') or 0)
              book_num   = raw_order % 100   # 101→1, 124→24

              # ── Find content files at new taxonomy paths ──────────────────
              def find_first(*rels):
                  for r in rels:
                      fp2 = os.path.join(book_path, r)
                      if os.path.exists(fp2):
                          return fp2, r
                  return None, None

              en_path,  en_rel  = find_first(
                  'book/en/summary.md', 'web/en/summary.md', 'youtube/en/summary.md')
              kn_path,  kn_rel  = find_first(
                  'book/kn/full.md', 'book/vol1/kn/full.md', 'web/kn/full.md')
              eke_path, eke_rel = find_first(
                  'book/eke/full.md', 'book/vol1/eke/full.md',
                  'web/eke/full.md', 'youtube/eke/full.md')

              def write_section_entry(file_path, rel, section_title):
                  with open(file_path, encoding='utf-8') as f:
                      content = f.read()
                  redirect_from = get_redirect_from(content)
                  content = strip_fm(content)
                  fm_args = dict(title=book_title, parent=section_title,
                                 nav_order=book_num)
                  if redirect_from:
                      fm_args['redirect_from'] = redirect_from
                  with open(file_path, 'w', encoding='utf-8') as f:
                      f.write(fm(**fm_args))
                      f.write(content)
                  sidebar_files.add(file_path)

              # English: book/en/summary.md > web/en/summary.md > youtube (fallback)
              en_fallback = False
              if en_path:
                  write_section_entry(en_path, en_rel, 'English Summaries')
              else:
                  en_fallback = True  # README becomes the English sidebar entry

              # Kannada Text: book/kn/full.md > web/kn/full.md
              if kn_path:
                  write_section_entry(kn_path, kn_rel, 'Kannada Text')

              # Eke Transliteration
              if eke_path:
                  write_section_entry(eke_path, eke_rel, 'Eke Transliteration')

              # ── Build landing page from README.md ─────────────────────────
              readme_md = os.path.join(book_path, 'README.md')
              if not os.path.exists(readme_md):
                  continue

              with open(readme_md, encoding='utf-8') as f:
                  readme = f.read()
              m = re.search(r'^# \d+ — (.+)$', readme, re.MULTILINE)
              kn_title = m.group(1).strip() if m else ''
              m = re.search(r'^\*\*([^*\n]+)\*\*', readme, re.MULTILINE)
              en_title = m.group(1) if m else ''
              m = re.search(r'^> (.+)$', readme, re.MULTILINE)
              desc_line = m.group(1) if m else ''
              m = re.search(r'^\*\*((?:✅|⚠️)[^\n]+)\*\*', readme, re.MULTILINE)
              status_line = m.group(1) if m else ''

              # Link table pointing to new taxonomy paths
              link_rows = []
              if kn_path:
                  link_rows.append(f'| 📖 Kannada text | [ಕನ್ನಡ](./{kn_rel}) |')
              if en_path:
                  link_rows.append(f'| 🇬🇧 English summary | [English](./{en_rel}) |')
              if eke_path:
                  link_rows.append(f'| 🔤 Eke romanisation | [Eke](./{eke_rel}) |')
              web_raw = os.path.join(book_path, 'web', 'kn', 'raw.md')
              if os.path.exists(web_raw):
                  link_rows.append('| 📝 DNS Bhat blog | [Blog](./web/kn/raw.md) |')

              body_parts = []
              if kn_title:
                  body_parts.append(f'# {kn_title}\n')
              if en_title:
                  body_parts.append(f'**{en_title}**\n')
              if desc_line:
                  body_parts.append(f'\n> {desc_line}\n')
              if status_line:
                  body_parts.append(f'\n*{status_line}*\n')
              if link_rows:
                  body_parts.append('\n---\n\n| Format | Link |\n|--------|------|\n')
                  body_parts.extend(r + '\n' for r in link_rows)

              # Front matter: preserve redirect_from from youtube/kn/full.md
              redirect_from_landing = get_redirect_from(orig)
              if en_fallback:
                  lf_args = dict(title=book_title, parent='English Summaries',
                                 nav_order=book_num)
              else:
                  lf_args = dict(title=book_title, nav_order=raw_order,
                                 nav_exclude=True)
              if redirect_from_landing:
                  lf_args['redirect_from'] = redirect_from_landing

              with open(readme_md, 'w', encoding='utf-8') as f:
                  f.write(fm(**lf_args) + ''.join(body_parts))
              sidebar_files.add(readme_md)

          # ── Mark every other .md file as nav_exclude ──────────────────────
          # This prevents raw.md, full.md (non-sidebar), youtube files etc.
          # from appearing in the just-the-docs sidebar.
          for root, dirs, files in os.walk(DNSBHAT):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              for fname in files:
                  if fname.endswith('.md'):
                      fp = os.path.join(root, fname)
                      if fp not in sidebar_files:
                          add_nav_exclude(fp)

          print("Format-first sidebar and landing pages generated.")
          PYEOF

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs

      - name: Setup Pages
        id: setup-pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.setup-pages.outputs.base_path }}"
        working-directory: docs
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
