title: ettuge — DNS Bhat Kannada Linguistics
description: DNS Bhat lecture series — Eke romanisation and English summaries

theme: just-the-docs

# Custom CSS
color_scheme: light

# Search
search_enabled: true

# Aux links in top-right
aux_links:
  "GitHub":
    - "https://github.com/vwulf/ettuge"

# Footer
footer_content: "DNS Bhat Kannada Linguistics — ettuge repository"

# Exclude non-content files from Jekyll build
exclude:
  - Gemfile
  - Gemfile.lock
  - "*.sbt"
  - "*.scala"
  - src/main/scala
  - src/test
  - project
  - target
  - .metals
  - .bsp
  - node_modules

# Markdown processor
markdown: kramdown
kramdown:
  input: GFM
